<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 背景圆角方形 -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>
  <!-- 后面的文档 -->
  <rect x="20" y="8" width="26" height="34" rx="3" fill="white" opacity="0.4"/>
  <!-- 前面的文档 -->
  <rect x="16" y="13" width="26" height="34" rx="3" fill="white" opacity="0.9"/>
  <!-- 前面文档的横线装饰 -->
  <line x1="21" y1="21" x2="37" y2="21" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="21" y1="26" x2="34" y2="26" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="21" y1="31" x2="36" y2="31" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- 合并箭头（向下汇聚） -->
  <path d="M32 44 L32 56" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M27 51 L32 56 L37 51" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
